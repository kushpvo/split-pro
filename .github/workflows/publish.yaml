name: Publish Docker

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the action on'
        default: 'main'
        required: true

jobs:
  build_and_publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAG_NAME="${{ github.ref_name }}"
          GIT_SHA="$(git rev-parse HEAD)"

          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL=latest
          else
            CHANNEL=next
          fi

          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/split-pro:${{ steps.tags.outputs.channel }}
            ghcr.io/${{ github.repository_owner }}/split-pro:${{ steps.tags.outputs.git_sha }}
            ghcr.io/${{ github.repository_owner }}/split-pro:${{ steps.tags.outputs.tag_name }}
          build-args: |
            APP_VERSION=${{ steps.tags.outputs.tag_name }}
            GIT_SHA=${{ steps.tags.outputs.git_sha }}
